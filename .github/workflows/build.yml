name: 🚀 100% Zero Error Mini APK 2026

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Super Light APK Builder
    runs-on: ubuntu-latest

    steps:
      - name: 📥 तेरा कोड ला रहे हैं
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 सेट कर रहे हैं
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Java 17 सेट कर रहे हैं
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🪄 मशीन खुद React का इंजन बनाएगी (Zero Error Magic ✨)
        run: |
          # मशीन खुद एकदम नया और हल्का ढाँचा बना रही है
          npx create-vite@latest MyReactApp --template react
          cd MyReactApp
          npm install

      - name: 📝 तेरा कोड डिब्बे में डाल रहे हैं
        run: |
          # अगर तेरी रिपॉजिटरी में App.js है, तो उसे यहाँ डाल देंगे
          if [ -f App.js ]; then
            cp App.js MyReactApp/src/App.jsx
          fi

      - name: 💻 ऐप को पका रहे हैं (Build)
        run: |
          cd MyReactApp
          npm run build

      - name: 📱 ऐप का नाम सेट कर रहे हैं (Capacitor)
        run: |
          cd MyReactApp
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 👉 ध्यान दें: यहीं पर तू अपने ऐप का नाम बदल सकता है!
          npx cap init "Mera Bawal App" "com.bawal.app" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: 🔨 असली Offline APK बना रहे हैं (सिर्फ 4-5 MB)
        run: |
          cd MyReactApp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🎁 फाइनली तेरा छोटा और पावरफुल ऐप 
        uses: actions/upload-artifact@v4
        with:
          name: Mini-Bawal-APK 📱
          path: MyReactApp/android/app/build/outputs/apk/debug/app-debug.apk
