name: 🚀 100% Zero Error Mini APK 2026

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 🏗️ Super Light APK Builder
    runs-on: ubuntu-latest

    steps:
      - name: 📥 तेरा कोड ला रहे हैं
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 24 सेट कर रहे हैं
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: ☕ Java 21 सेट कर रहे हैं (👉 यही असली फिक्स है!)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # 17 की जगह 21 कर दिया 🔥

      - name: 🪄 मशीन खुद React का इंजन बना रही है
        run: |
          npx create-vite@latest MyReactApp --template react
          cd MyReactApp
          npm install
          npm install lucide-react

      - name: 📝 तेरा कोड डिब्बे में डाल रहे हैं
        run: |
          if [ -f App.js ]; then
            cp App.js MyReactApp/src/App.jsx
          fi

      - name: 💻 ऐप को पका रहे हैं (Build)
        run: |
          cd MyReactApp
          npm run build

      - name: 📱 ऐप का नाम सेट कर रहे हैं
        run: |
          cd MyReactApp
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 👉 यहाँ अपना नाम सेट कर ले!
          npx cap init "Mera Bawal App" "com.bawal.app" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: 🔨 असली Offline APK बना रहे हैं (Java 21 की पावर से ⚡)
        run: |
          cd MyReactApp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🎁 फाइनली तेरा छोटा और पावरफुल ऐप
        uses: actions/upload-artifact@v4
        with:
          name: Mini-Bawal-APK 📱
          path: MyReactApp/android/app/build/outputs/apk/debug/app-debug.apk
