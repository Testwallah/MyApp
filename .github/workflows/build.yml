name: 🏆 Final React Native APK 2026

on:
  push:
    branches:
      - main

# 1️⃣ GitHub को बता रहे हैं कि जबरदस्ती Node 24 चलाओ!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: 🚀 Build My APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 कोड चेकआउट करें
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 24 सेट करें (पीले एरर का इलाज)
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: ☕ Java 17 सेट करें
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🪄 नया ढाँचा बनाएँ (लाल एरर का परमानेंट इलाज)
        # 2️⃣ बिना किसी 'yes' के सीधा नया टूल इस्तेमाल कर रहे हैं
        run: npx @react-native-community/cli@latest init MyApp --skip-install

      - name: 📦 पैकेजेस इनस्टॉल करें
        run: |
          cd MyApp
          npm install

      - name: 📝 तुम्हारी App.js फाइल कॉपी करें
        run: |
          if [ -f App.js ]; then
            cp App.js MyApp/App.js
          fi

      - name: 🔨 असली APK पकाएं
        run: |
          cd MyApp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🎁 डाउनलोड लिंक तैयार करें
        uses: actions/upload-artifact@v4
        with:
          name: Final-Bawal-APK 📱
          path: MyApp/android/app/build/outputs/apk/debug/app-debug.apk
