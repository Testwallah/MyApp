name: 🚀 Build Offline React JS APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Offline APK Builder
    runs-on: ubuntu-latest

    steps:
      - name: 📥 तेरा कोड ला रहे हैं
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 सेट कर रहे हैं
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Java 17 सेट कर रहे हैं
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 पैकेजेस इंस्टॉल कर रहे हैं
        run: npm install

      - name: 💻 React ऐप को पका रहे हैं (Build)
        run: npm run build

      - name: 🪄 Capacitor सेट कर रहे हैं (Offline Magic ✨)
        run: |
          # यह टूल तेरे कोड को ऑफलाइन डिब्बे में डालेगा
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # यह अपने आप चेक करेगा कि तेरा फोल्डर dist है या build
          if [ -d "dist" ]; then
            WEB_DIR="dist"
          else
            WEB_DIR="build"
          fi
          
          npx cap init "MyOfflineApp" "com.myoffline.app" --web-dir $WEB_DIR
          npx cap add android
          npx cap sync android

      - name: 🔨 असली Offline APK बना रहे हैं
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🎁 फाइनल ऐप डाउनलोड लिंक 
        uses: actions/upload-artifact@v4
        with:
          name: React-Offline-APK 📱
          path: android/app/build/outputs/apk/debug/app-debug.apk
